<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confess Generator - Buat Web Cinta Kamu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff5f8; --accent: #f06292; --glass: rgba(255, 255, 255, 0.6); }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--glass); backdrop-filter: blur(10px); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        h2 { font-family: 'Playfair Display', serif; color: var(--accent); margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ddd; outline: none; font-family: inherit; }
        .btn { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 50px; cursor: pointer; font-weight: 600; width: 100%; transition: 0.3s; }
        .btn:hover { transform: scale(1.02); opacity: 0.9; }
        #result { margin-top: 20px; display: none; background: white; padding: 15px; border-radius: 10px; border: 1px dashed var(--accent); }
        #linkResult { width: 100%; border: none; color: var(--accent); font-size: 0.8rem; margin-top: 5px; text-align: center; outline: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Confess Generator ❤️</h2>
        <input type="text" id="nama" placeholder="Nama Pasangan (Contoh: Adinda)">
        <input type="text" id="foto" placeholder="Link Foto (Contoh: bit.ly/foto-dia)">
        <input type="text" id="musik" placeholder="Link Musik MP3 (Contoh: bit.ly/lagu-kita)">
        <textarea id="pesan" rows="3" placeholder="Pesan Rahasia..."></textarea>
        
        <button class="btn" onclick="generate()">Buat Link Sekarang 🚀</button>

        <div id="result">
            <p style="font-size: 0.9rem;">Link Kamu Sudah Siap:</p>
            <input type="text" id="linkResult" readonly>
            <button class="btn" style="margin-top:10px; font-size: 0.8rem;" onclick="copyLink()">Salin Link</button>
        </div>
    </div>

    <script>
        function generate() {
            const n = btoa(document.getElementById('nama').value);
            const f = btoa(document.getElementById('foto').value);
            const m = btoa(document.getElementById('musik').value);
            const p = btoa(document.getElementById('pesan').value);

            // Ganti 'view.html' sesuai nama file penampil kamu
            const url = window.location.origin + window.location.pathname.replace('index.html', '') + `view.html?n=${n}&f=${f}&m=${m}&p=${p}`;
            
            document.getElementById('result').style.display = 'block';
            document.getElementById('linkResult').value = url;
        }

        function copyLink() {
            const copyText = document.getElementById("linkResult");
            copyText.select();
            document.execCommand("copy");
            alert("Link berhasil disalin! Kirim ke dia ya ❤️");
        }
    </script>
</body>
</html>
