<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confess Pro -  Rai</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #f06292;
            --bg-color: #fff5f8;
            --glass-sidebar: rgba(255, 255, 255, 0.15);
            --glass-card: rgba(255, 255, 255, 0.2);
            --glass-border: rgba(255, 255, 255, 0.45);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-color); 
            background-image: radial-gradient(circle at 0% 0%, #ffdee9 0%, #fff5f8 100%);
            color: #333; height: 100vh; overflow: hidden; 
        }

        /* --- Welcome SPA (Luxury Typing) --- */
        #welcome-spa {
            position: fixed; inset: 0; 
            background: rgba(255, 245, 248, 0.8);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            transition: 1s cubic-bezier(0.85, 0, 0.15, 1);
        }

        /* --- Sidebar Ultra Glass --- */
        .sidebar {
            position: fixed; left: -290px; top: 0; width: 280px; height: 100%;
            background: var(--glass-sidebar); 
            backdrop-filter: blur(40px); -webkit-backdrop-filter: blur(40px);
            z-index: 1500; transition: transform 0.6s cubic-bezier(0.85, 0, 0.15, 1);
            padding: 60px 20px; border-right: 1px solid var(--glass-border);
            box-shadow: 20px 0 50px rgba(0,0,0,0.02);
        }
        .sidebar.active { transform: translateX(290px); }
        .sidebar h2 { font-family: 'Playfair Display'; color: var(--accent); margin-bottom: 50px; text-align: center; font-size: 1.8rem; letter-spacing: 1px; }
        
        .nav-item {
            padding: 18px 25px; border-radius: 20px; margin-bottom: 12px;
            cursor: pointer; transition: all 0.4s ease; color: #555; font-weight: 500;
            display: flex; align-items: center; gap: 15px;
        }
        .nav-item.active { 
            background: var(--accent); color: #fff; 
            box-shadow: 0 10px 25px rgba(240, 98, 146, 0.3);
            transform: scale(1.03);
        }

        /* --- Content Layout --- */
        .header { padding: 35px 25px 15px; display: flex; align-items: center; gap: 18px; }
        .menu-btn { font-size: 2.2rem; cursor: pointer; color: var(--accent); transition: 0.3s; }
        .menu-btn:active { transform: scale(0.8); }

        .content { padding: 0 25px 50px; max-width: 650px; margin: 0 auto; overflow-y: auto; height: calc(100vh - 100px); scrollbar-width: none; }
        .content::-webkit-scrollbar { display: none; }

        .page { display: none; opacity: 0; transform: translateY(30px); transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        /* --- Glass Cards (Lebih Transparan) --- */
        .glass-card {
            background: var(--glass-card); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-radius: 35px; padding: 35px; border: 1px solid var(--glass-border);
            margin-bottom: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.03);
        }

        /* --- Input Style Mewah --- */
        .input-group { margin-bottom: 22px; }
        label { font-size: 0.7rem; font-weight: 700; color: var(--accent); margin: 0 0 8px 15px; display: block; text-transform: uppercase; letter-spacing: 2px; }
        input, textarea {
            width: 100%; padding: 18px 22px; border-radius: 22px; border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.4); outline: none; font-size: 16px; transition: 0.4s;
            color: #333;
        }
        input:focus, textarea:focus { background: rgba(255,255,255,0.7); border-color: var(--accent); box-shadow: 0 0 20px rgba(240, 98, 146, 0.1); }

        .btn-create {
            width: 100%; padding: 20px; border-radius: 50px; border: none;
            background: var(--accent); color: #fff; font-weight: 600; cursor: pointer;
            box-shadow: 0 12px 30px rgba(240, 98, 146, 0.3); transition: 0.4s;
            font-size: 1rem; letter-spacing: 1px;
        }
        .btn-create:active { transform: scale(0.94); }

        /* --- History Section --- */
        .history-card {
            background: rgba(255,255,255,0.35); backdrop-filter: blur(10px);
            padding: 22px; border-radius: 25px; margin-bottom: 15px; 
            display: flex; justify-content: space-between; align-items: center;
            border: 1px solid var(--glass-border);
        }
        .h-btn { padding: 10px 18px; border-radius: 15px; border: none; font-size: 0.75rem; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .h-btn:active { transform: scale(0.9); }

        .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.05); backdrop-filter: blur(6px); display: none; z-index: 1400; }
        .overlay.active { display: block; }
    </style>
</head>
<body>

    <div id="welcome-spa">
        <div style="text-align: center;">
            <h1 id="w-typing" style="font-family: 'Playfair Display'; color: var(--accent); font-size: 2.8rem;"></h1>
            <p id="w-sub" style="color: #888; opacity: 0; transition: 1s; margin-top: 10px;">The most elite confession tool.</p>
            <button class="btn-create" id="btn-go" style="width: auto; padding: 14px 50px; margin-top: 35px; opacity: 0; transition: 1s;" onclick="closeWelcome()">Explore Dashboard ✨</button>
        </div>
    </div>

    <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

    <nav class="sidebar" id="sidebar">
        <h2>Confess Pro.</h2>
        <div class="nav-item active" id="n-dash" onclick="switchPage('dashboard', this)"><span>🏠</span> Dashboard</div>
        <div class="nav-item" id="n-create" onclick="switchPage('create', this)"><span>✍️</span> Create New</div>
        <div class="nav-item" onclick="switchPage('history', this)"><span>📜</span> History</div>
    </nav>

    <div class="header">
        <div class="menu-btn" onclick="toggleSidebar()">☰</div>
        <h2 id="page-title" style="font-family: 'Playfair Display'; font-size: 1.8rem;">Dashboard</h2>
    </div>

    <div class="content">
        <div class="page active" id="dashboard">
            <div class="glass-card">
                <h3 style="font-family: 'Playfair Display'; font-size: 1.4rem;">Welcome back, Leader! 👑</h3>
                <p style="font-size: 0.95rem; color: #666; margin-top: 15px; line-height: 1.7;">Semua sistem berjalan lancar. Siap membuat kejutan manis berikutnya?</p>
            </div>
            <div style="display: flex; gap: 20px;">
                <div class="glass-card" style="flex: 1; text-align: center; padding: 25px;">
                    <h1 id="stat-count" style="color: var(--accent); font-size: 3rem;">0</h1>
                    <p style="font-size: 0.65rem; font-weight: 700; letter-spacing: 2px; color: #aaa;">CREATED</p>
                </div>
                <div class="glass-card" style="flex: 1; text-align: center; padding: 25px; background: var(--accent); border: none;">
                    <h1 style="color: #fff; font-size: 1.4rem; margin: 12px 0;">ACTIVE</h1>
                    <p style="font-size: 0.65rem; font-weight: 700; color: rgba(255,255,255,0.7); letter-spacing: 1px;">SYSTEM</p>
                </div>
            </div>
        </div>

        <div class="page" id="create">
            <div class="glass-card">
                <div class="input-group"><label>Nama Dia</label><input type="text" id="n" placeholder="Siapa pangeran/putrinya?"></div>
                <div class="input-group"><label>Nomor WA Kamu (62xxx)</label><input type="number" id="w" placeholder="Hasilnya kirim ke mana?"></div>
                <div class="input-group"><label>Link Foto</label><input type="text" id="f" placeholder="Pinterest/Imgur URL"></div>
                <div class="input-group"><label>Link Musik (.mp3)</label><input type="text" id="m" placeholder="Lagu paling romantis..."></div>
                <div class="input-group"><label>Memory (Interactive)</label><input type="text" id="mem" placeholder="Momen spesial kalian?"></div>
                <div class="input-group"><label>Pesan Penutup</label><textarea id="p" rows="3" placeholder="Apa kata terakhirmu?"></textarea></div>
                <button class="btn-create" onclick="generate()">Generate Masterpiece ❤️</button>
            </div>
            <div id="result-box" style="display:none;" class="glass-card">
                <p style="font-size: 0.85rem; font-weight: 700; color: var(--accent);">Link kamu sudah siap, Chief!</p>
                <input type="text" id="res-link" readonly style="margin: 15px 0; background: rgba(255,255,255,0.8); font-size: 11px; border: 1px dashed var(--accent);">
                <button class="btn-create" style="background: #333;" onclick="copy()">Copy to Clipboard</button>
            </div>
        </div>

        <div class="page" id="history">
            <div id="hist-list"></div>
        </div>
    </div>

    <script>
        const text = "Confess Pro."; let i = 0;
        function type() {
            if(i < text.length) { document.getElementById("w-typing").innerHTML += text.charAt(i); i++; setTimeout(type, 100); }
            else { 
                document.getElementById("w-sub").style.opacity = "1";
                document.getElementById("btn-go").style.opacity = "1"; 
            }
        }
        window.onload = () => { type(); updateStat(); };

        function closeWelcome() { document.getElementById('welcome-spa').style.transform = "translateY(-100%)"; }
        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); document.getElementById('overlay').classList.toggle('active'); }

        function switchPage(pId, el) {
            document.querySelectorAll('.nav-item').forEach(v => v.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('page-title').innerText = pId.charAt(0).toUpperCase() + pId.slice(1);
            document.querySelectorAll('.page').forEach(v => v.classList.remove('active'));
            document.getElementById(pId).classList.add('active');
            if(pId === 'history') renderHistory();
            if(pId === 'dashboard') updateStat();
            if(window.innerWidth < 1000) toggleSidebar();
        }

        function generate() {
            const data = {
                n: encodeURIComponent(document.getElementById('n').value),
                w: encodeURIComponent(document.getElementById('w').value),
                f: encodeURIComponent(document.getElementById('f').value),
                m: encodeURIComponent(document.getElementById('m').value),
                mem: encodeURIComponent(document.getElementById('mem').value),
                p: encodeURIComponent(document.getElementById('p').value)
            };
            const path = window.location.pathname.substring(0, window.location.pathname.lastIndexOf('/') + 1);
            const link = window.location.origin + path + `view.html?n=${data.n}&w=${data.w}&f=${data.f}&m=${data.m}&mem=${data.mem}&p=${data.p}`;
            
            document.getElementById('result-box').style.display = 'block';
            document.getElementById('res-link').value = link;

            let h = JSON.parse(localStorage.getItem('confHistory') || "[]");
            h.unshift({ name: document.getElementById('n').value || "Someone", raw: data, url: link, date: new Date().toLocaleDateString() });
            localStorage.setItem('confHistory', JSON.stringify(h));
        }

        function renderHistory() {
            const list = document.getElementById('hist-list');
            let h = JSON.parse(localStorage.getItem('confHistory') || "[]");
            if(h.length === 0) { list.innerHTML = "<div class='glass-card'>Belum ada sejarah tercipta.</div>"; return; }
            list.innerHTML = h.map((item, i) => `
                <div class="history-card">
                    <div><strong>${item.name}</strong><br><small style="color:#aaa">${item.date}</small></div>
                    <div style="display:flex; gap:10px;">
                        <button class="h-btn" style="background:rgba(0,0,0,0.05);" onclick="editItem(${i})">Edit</button>
                        <button class="h-btn" style="background:var(--accent); color:#fff;" onclick="copySpecific('${item.url}')">Copy</button>
                    </div>
                </div>
            `).join('');
        }

        function editItem(i) {
            let h = JSON.parse(localStorage.getItem('confHistory'));
            const d = h[i].raw;
            document.getElementById('n').value = decodeURIComponent(d.n);
            document.getElementById('w').value = decodeURIComponent(d.w);
            document.getElementById('f').value = decodeURIComponent(d.f);
            document.getElementById('m').value = decodeURIComponent(d.m);
            document.getElementById('mem').value = decodeURIComponent(d.mem);
            document.getElementById('p').value = decodeURIComponent(d.p);
            switchPage('create', document.getElementById('n-create'));
        }

        function updateStat() {
            let h = JSON.parse(localStorage.getItem('confHistory') || "[]");
            document.getElementById('stat-count').innerText = h.length;
        }

        function copySpecific(url) { navigator.clipboard.writeText(url); alert("Link Copied!"); }
        function copy() { document.getElementById('res-link').select(); document.execCommand('copy'); alert("Link Berhasil Disalin, semoga berhasil! ✨"); }
    </script>
</body>
</html>
